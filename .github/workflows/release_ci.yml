name: Release CI
run-name: "Continous Release"

permissions:
  contents: write
  issues: read
  id-token: write

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * 4" # this means every Thursday @1am UTC

concurrency: release

jobs:
  release_wrkflw:
    name: Do release
    uses: zscaler/terraform-modules-zscaler-ci-workflows/.github/workflows/release_ci.yml@v0.1
    secrets: inherit
    with:
      cloud: azure
      validate_max_parallel: 20
      # The release gate runs `Plan` only: it validates that every example still
      # produces a clean `terraform plan`, without deploying real VMs.
      #
      # Full apply -> idempotence -> destroy runs (which spin up App Connectors +
      # a bastion and are bounded by the westus2 core quota) are intentionally NOT
      # run for the whole matrix on every release. They are flaky and expensive at
      # scale, and repeatedly exhausted the region quota. Instead, run real deploy
      # validation on demand for the specific example(s) you touched via the
      # `/idempotence <path>` ChatOps command (idempotence-command.yml) before
      # cutting a release.
      #
      # Plan deploys nothing, so the examples can run in parallel with no quota risk.
      test_max_parallel: 10
      fail_fast: false
      terratest_action: Plan # keep in mind that this has to start with capital letter
