name: "Terratest"
description: "Runs Terratest for a specified path."
inputs:
  tf_version:
    description: "TF version used."
    required: true
  path:
    description: "Path to Terraform module."
    required: true
  terratest_action:
    description: The action (name of a test in Terratest) that will be passed to the Makefile's ACTION parameter
    type: string
    required: true
  pr-id:
    description: A PR number. Optional value, you might want to use it to prefix resources created for a particular PR to identify them easily.
    type: string
    default: ""
    required: false

runs:
  using: "composite"
  steps:
    - name: setup Terraform
      uses: hashicorp/setup-terraform@633666f66e0061ca3b725c73b2ec20cd13a8fdd1 #v2
      with:
        terraform_version: ${{ inputs.tf_version }}
        terraform_wrapper: false

    - name: setup Go
      uses: actions/setup-go@v5
      with:
        go-version: "1.25"

    # Azure auth via OIDC federation. The caller's _tf_test.yml exports
    # ARM_CLIENT_ID / ARM_SUBSCRIPTION_ID / ARM_TENANT_ID and the job has
    # id-token: write. No client secret is stored in the repo; GitHub's OIDC
    # token is exchanged for short-lived Azure credentials. The azurerm
    # provider also honors ARM_USE_OIDC=true to authenticate the same way.
    - name: login to Azure (OIDC)
      uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
      with:
        client-id: ${{ env.ARM_CLIENT_ID }}
        tenant-id: ${{ env.ARM_TENANT_ID }}
        subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}

    - name: ${{ inputs.terratest_action }} infrastructure
      env:
        TPATH:  ${{ inputs.path }}
        ACTION: ${{ inputs.terratest_action }}
        PRID:   ${{ inputs.pr-id }}
        # Tell the azurerm provider to authenticate using the GitHub OIDC token
        # exchanged above rather than a client secret.
        ARM_USE_OIDC: "true"
        # Surface PRID to Terraform as TF_VAR_pr_id so test fixtures can name
        # resources `p<PR_ID>-...` (PR runs) or `tt-...` (release / scheduled
        # runs). testskeleton.GenerateTerraformVarsInfo("azure") reads PRID and
        # builds the name_prefix accordingly, so orphaned resources from a
        # failed run can be identified and cleaned up by PR number.
        TF_VAR_pr_id: ${{ inputs.pr-id }}
      shell: bash
      run: make $TPATH ACTION=$ACTION
